name: pdfrx_example
description: "Demonstrates how to use the pdfrx plugin."
publish_to: 'none'

environment:
  sdk: ">=2.19.6 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  pdfrx:
    path: ../../

  cupertino_icons: ^1.0.8
  rxdart: ^0.28.0
  url_launcher: ^6.2.0
  synchronized: ^3.3.0+3
  file_selector: ^1.0.3
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:

flutter:
  uses-material-design: true

  assets:
    - assets/
