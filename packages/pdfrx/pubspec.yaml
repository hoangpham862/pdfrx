name: pdfrx
description: pdfrx is a rich and fast PDF viewer and manipulation plugin built on the top of PDFium. Supports viewing, editing, combining PDFs on Android, iOS, Windows, macOS, Linux, and Web.
version: 2.2.24
homepage: https://github.com/espresso3389/pdfrx
repository: https://github.com/espresso3389/pdfrx/tree/master/packages/pdfrx
issue_tracker: https://github.com/espresso3389/pdfrx/issues
screenshots:
  - description: 'Viewer example on Web'
    path: screenshot.jpg

environment:
  sdk: ">=2.19.6 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  pdfrx_engine:
    path: ../pdfrx_engine
  pdfium_flutter:
    path: ../pdfium_flutter
  collection:
  crypto: ^3.0.6
  ffi:
  flutter:
    sdk: flutter
  http:
  path:
  path_provider: ^2.1.5
  rxdart:
  synchronized: ^3.3.0+3
  url_launcher: ^6.2.0
  vector_math: ^2.1.4
  web: ^1.0.0
  yaml:

dev_dependencies:
  ffigen: ^14.0.1
  flutter_test:
    sdk: flutter
  flutter_lints:
  archive: ^3.6.1

executables:
  remove_wasm_modules:
  remove_darwin_pdfium_modules:

flutter:
  assets:
    - assets/
